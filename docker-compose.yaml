services:
  postgres:
    image: postgres:15.0
    container_name: telegram-bot-db
    restart: "no"
    ports:
      - "5433:5432"
    volumes:
      - telegram_bot_data:/var/lib/postgresql/data
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: 40593319
      POSTGRES_DB: telegram_bot
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $POSTGRES_USER -d $POSTGRES_DB"]
      interval: 10s
      timeout: 5s
      start_period: 10s
      retries: 5

volumes:
  telegram_bot_data: