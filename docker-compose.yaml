services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: springbot-backend
    restart: "no"
    depends_on:
      postgres:
        condition: service_healthy
    env_file:
      - .env
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/${DB_NAME}
    ports:
      - "8080:8080"

  postgres:
    image: postgres:15.0
    container_name: telegram-bot-db
    restart: "no"
    ports:
      - "5433:5432"
    volumes:
      - telegram_bot_data:/var/lib/postgresql/data
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $POSTGRES_USER -d $POSTGRES_DB"]
      interval: 10s
      timeout: 5s
      start_period: 10s
      retries: 5

volumes:
  telegram_bot_data: