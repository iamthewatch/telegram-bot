databaseChangeLog:
  - changeSet:
      id: create-user-session
      author: iamthewatch
      changes:
        - createTable:
            tableName: user_session
            columns:
              - column:
                  name: id
                  type: BIGSERIAL
                  constraints:
                    primaryKey: true
                    nullable: false

              - column:
                  name: chat_id
                  type: BIGINT
                  constraints:
                    nullable: false

              - column:
                  name: locale
                  type: VARCHAR(20)

      rollback:
        - dropTable:
            tableName: user_session