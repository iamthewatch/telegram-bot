databaseChangeLog:
  - changeSet:
      id: add-consultation-credit-state
      author: iamthewatch
      changes:
        - addColumn:
            tableName: user_session
            columns:
              - column:
                  name: consultation_credit_type
                  type: VARCHAR(50)
      rollback:
        - dropColumn:
            tableName: user_session
            columnName: consultation_credit_type

  - changeSet:
      id: add-credit-type-columns
      author: iamthewatch
      changes:
        - addColumn:
            tableName: consultation_request
            columns:
              - column:
                  name: credit_type
                  type: VARCHAR(255)
                  defaultValue: unknown
                  constraints:
                    nullable: false

              - column:
                  name: username
                  type: VARCHAR(255)
                  defaultValue: unknown
                  constraints:
                    nullable: false

              - column:
                  name: firstname
                  type: VARCHAR(255)

              - column:
                  name: lastname
                  type: VARCHAR(255)

        - dropColumn:
            tableName: consultation_request
            columnName: client_type

      rollback:
        - addColumn:
            tableName: consultation_request
            columns:
              - column:
                  name: client_type
                  type: VARCHAR(255)

        - dropColumn:
            tableName: consultation_request
            columnName: credit_type

        - dropColumn:
            tableName: consultation_request
            columnName: username

        - dropColumn:
            tableName: consultation_request
            columnName: firstname

        - dropColumn:
            tableName: consultation_request
            columnName: lastname