databaseChangeLog:
  - changeSet:
      id: add-consultation-flow-columns
      author: iamthewatch
      changes:
        - addColumn:
            tableName: user_session
            columns:
              - column:
                  name: consultation_person_type
                  type: VARCHAR(50)
              - column:
                  name: awaiting_consultation_client_type
                  type: BOOLEAN
                  defaultValueBoolean: false
      rollback:
        - dropColumn:
            tableName: user_session
            columnName: consultation_person_type
        - dropColumn:
            tableName: user_session
            columnName: awaiting_consultation_client_type

  - changeSet:
      id: create-consultation-request
      author: iamthewatch
      changes:
        - createTable:
            tableName: consultation_request
            columns:
              - column:
                  name: id
                  type: BIGSERIAL
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: chat_id
                  type: BIGINT
                  constraints:
                    nullable: false
              - column:
                  name: person_type
                  type: VARCHAR(50)
                  constraints:
                    nullable: false
              - column:
                  name: client_type
                  type: VARCHAR(255)
                  constraints:
                    nullable: false
              - column:
                  name: created_at
                  type: TIMESTAMP
                  constraints:
                    nullable: false
                  defaultValueComputed: CURRENT_TIMESTAMP
      rollback:
        - dropTable:
            tableName: consultation_request

